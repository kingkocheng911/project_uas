<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MepuPoin adalah platform digital koperasi desa.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MepuPoin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MepuPoin</title>
  <link rel="manifest" href="manifest.json">
  <script src="google_maps_config.js"></script>
  <script>
    (function () {
      var flutterStarted = false;

      function startFlutter() {
        if (flutterStarted) return;
        flutterStarted = true;

        var flutterScript = document.createElement('script');
        flutterScript.src = 'flutter_bootstrap.js';
        flutterScript.async = true;
        document.body.appendChild(flutterScript);
      }

      window.__mepuPoinGoogleMapsReady = startFlutter;

      window.addEventListener('load', function () {
        var apiKey = window.googleMapsApiKey;
        if (!apiKey || apiKey === 'YOUR_GOOGLE_MAPS_API_KEY') {
          startFlutter();
          return;
        }

        if (window.google && window.google.maps) {
          startFlutter();
          return;
        }

        var script = document.createElement('script');
        script.src = 'https://maps.googleapis.com/maps/api/js?key='
          + encodeURIComponent(apiKey)
          + '&libraries=places,marker,geometry'
          + '&loading=async'
          + '&callback=__mepuPoinGoogleMapsReady';
        script.async = true;
        script.defer = true;
        script.onerror = startFlutter;
        document.head.appendChild(script);
      });
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
</body>
</html>
